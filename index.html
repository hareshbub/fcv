<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dv.Haresh Foundation | Certification Verification</title>
    
    <!-- PDF Generation Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        /* Exact Brand Colors Extracted from Logo */
        :root {
            --fd-blue: #30A9FE;
            --fd-green: #76D124;
            --fd-red: #FF352C;
            --fd-yellow: #F4CD16;
            --bg-color: #F4F7F6;
            --text-main: #2C3E50;
            --text-muted: #7F8C8D;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            background: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .brand-strip {
            width: 100%;
            height: 6px;
            background: linear-gradient(to right, var(--fd-green) 25%, var(--fd-blue) 25% 50%, var(--fd-red) 50% 75%, var(--fd-yellow) 75%);
        }

        header {
            width: 100%;
            padding: 30px 0 20px 0;
            text-align: center;
            background: #ffffff;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.03);
        }

        h1 { margin: 0; font-size: 1.8rem; font-weight: 800; letter-spacing: 1px; color: var(--text-main); }

        .main-content {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        .verification-card {
            background: #ffffff;
            border-radius: 15px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            position: relative;
            overflow: hidden;
        }

        .verification-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(to right, var(--fd-blue), var(--fd-green));
        }

        .verification-card h2 { margin-top: 0; font-size: 1.3rem; margin-bottom: 25px; font-weight: 600; color: var(--text-main); }

        input[type="text"] {
            width: 100%; padding: 15px; margin-bottom: 20px; 
            border: 2px solid #e0e0e0;
            background: #fdfdfd; color: var(--text-main); border-radius: 8px; font-size: 1rem;
            font-family: inherit; box-sizing: border-box; outline: none; text-align: center; letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus { border-color: var(--fd-blue); box-shadow: 0 0 8px rgba(48, 169, 254, 0.2); }

        button {
            width: 100%; padding: 15px; border: none; border-radius: 8px; background: var(--fd-blue);
            color: white; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: background 0.3s;
        }
        button:hover { background: #268bd2; }

        .download-btn {
            background: var(--fd-green);
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(118, 209, 36, 0.3);
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .download-btn:hover { background: #62b01d; }
        
        .god-btn { background: var(--fd-red); box-shadow: 0 4px 15px rgba(255, 53, 44, 0.3); }
        .god-btn:hover { background: #d92d25; }

        #result-box { margin-top: 25px; padding: 20px; border-radius: 8px; display: none; font-size: 1.1rem; line-height: 1.6; animation: fadeIn 0.4s ease; color: var(--text-main); }
        .success { background: rgba(118, 209, 36, 0.1); border-left: 5px solid var(--fd-green); }
        .error { background: rgba(255, 53, 44, 0.1); border-left: 5px solid var(--fd-red); }
        .god-mode { background: rgba(244, 205, 22, 0.15); border-left: 5px solid var(--fd-yellow); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        footer { width: 100%; padding: 30px 0; text-align: center; background: #ffffff; margin-top: auto; border-top: 1px solid #eeeeee; }
        
        /* White background added to ensure JPGs without transparency look clean */
        .logo { max-width: 220px; height: auto; background-color: white; }
    </style>
</head>
<body>

    <div class="brand-strip"></div>

    <header>
        <h1>Dv.Haresh Foundation</h1>
        <div style="font-size: 0.9rem; letter-spacing: 2px; color: var(--text-muted); margin-top: 5px; font-weight: 600;">CERTIFICATION REGISTRY</div>
    </header>

    <div class="main-content">
        <div class="verification-card">
            <h2>Enter Certificate ID</h2>
            <input type="text" id="certId" placeholder="e.g. HYPSS-B01" autocomplete="off">
            <button onclick="triggerVerification()">Verify Credential</button>
            
            <div id="result-box"></div>
        </div>
    </div>

    <footer>
        <!-- Changed to logo.jpg -->
        <img src="logo.jpg" alt="Dv.Haresh Foundation Logo" class="logo" id="brand-logo" crossorigin="anonymous">
    </footer>

    <script>
        const CSV_URL = 'data.csv';
        let globalData = [];
        let globalHeaders = [];

        async function loadData() {
            try {
                const response = await fetch(CSV_URL);
                const text = await response.text();
                const rows = text.split('\n').map(row => row.replace(/\r/g, '').split(','));
                globalHeaders = rows[0].map(h => h.trim());
                globalData = rows.slice(1).filter(row => row.length > 1); 
                
                const urlParams = new URLSearchParams(window.location.search);
                const targetID = urlParams.get('id');
                if (targetID) {
                    document.getElementById('certId').value = targetID;
                    triggerVerification();
                }
            } catch (error) {
                console.error("Database connection error:", error);
            }
        }

        function triggerVerification() {
            const inputId = document.getElementById('certId').value.trim();
            const resultBox = document.getElementById('result-box');
            resultBox.style.display = 'block';
            resultBox.className = ''; 

            if (!inputId) {
                resultBox.innerHTML = "Please enter a valid ID.";
                resultBox.classList.add('error');
                return;
            }

            if (inputId === "GOD") {
                resultBox.innerHTML = `
                    <strong style="color: var(--fd-red);">ADMIN ACCESS GRANTED.</strong><br>
                    Complete database roster is ready for extraction.
                    <button class="download-btn god-btn" onclick="generateGodModePDF()">⬇ Download Master Database</button>
                `;
                resultBox.classList.add('god-mode');
                return;
            }

            const candidateRow = globalData.find(row => row[0] && row[0].trim() === inputId);

            if (candidateRow) {
                const name = candidateRow[1];
                const date = candidateRow[2];
                const course = candidateRow[3];

                resultBox.innerHTML = `
                    <div style="font-size: 2.5rem; margin-bottom: 5px; color: var(--fd-green);">✓</div>
                    <strong>AUTHENTICATED</strong><br><br>
                    Yes, <strong>${name}</strong> is a verified individual who has successfully completed the 2 hrs masterclass in <strong>${course}</strong> on ${date}.
                    <br>
                    <button class="download-btn" onclick="generateNormalPDF('${inputId}')">⬇ Download Official Document</button>
                `;
                resultBox.classList.add('success');
            } else {
                resultBox.innerHTML = "<strong style='color: var(--fd-red);'>NOT FOUND</strong><br>This certificate ID does not exist in our secure registry.";
                resultBox.classList.add('error');
            }
        }

        // --- UPDATED LOGO EXTRACTION ENGINE FOR JPG ---
        function getLogoData() {
            try {
                const img = document.getElementById('brand-logo');
                if (!img || !img.complete || img.naturalWidth === 0) return null;
                
                const canvas = document.createElement('canvas');
                canvas.width = img.naturalWidth;
                canvas.height = img.naturalHeight;
                const ctx = canvas.getContext('2d');
                
                // Draw a white background first (since JPG doesn't support transparency)
                ctx.fillStyle = "#ffffff";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0);
                
                return {
                    // Force JPEG format and apply 0.8 quality compression
                    dataUrl: canvas.toDataURL('image/jpeg', 0.8),
                    aspectRatio: img.naturalWidth / img.naturalHeight
                };
            } catch (err) {
                return null;
            }
        }

        function addFooterToPDF(doc) {
            const pageCount = doc.internal.getNumberOfPages();
            const logo = getLogoData();
            const pageWidth = doc.internal.pageSize.width;
            const pageHeight = doc.internal.pageSize.height;

            for (let i = 1; i <= pageCount; i++) {
                doc.setPage(i);
                
                if (logo) {
                    const imgHeight = 16; 
                    const imgWidth = imgHeight * logo.aspectRatio; 
                    
                    // Changed to insert as JPEG
                    doc.addImage(logo.dataUrl, 'JPEG', (pageWidth - imgWidth) / 2, pageHeight - 26, imgWidth, imgHeight);
                    
                    doc.setFontSize(8);
                    doc.setTextColor(100);
                    doc.text("Official Record - Dv.Haresh Foundation", pageWidth / 2, pageHeight - 6, { align: 'center' });
                } else {
                    doc.setFontSize(10);
                    doc.setTextColor(100);
                    doc.text("Official Record - Dv.Haresh Foundation", pageWidth / 2, pageHeight - 10, { align: 'center' });
                }
            }
        }

        function generateNormalPDF(inputId) {
            const candidateRow = globalData.find(row => row[0] === inputId);
            if (!candidateRow) return;

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            const id = candidateRow[0];
            const name = candidateRow[1];
            const date = candidateRow[2];
            const course = candidateRow[3];

            doc.setFontSize(22);
            doc.setTextColor(48, 169, 254); 
            doc.text("BONAFIDE CERTIFICATE", 105, 30, { align: 'center' });
            
            doc.setFontSize(12);
            doc.setTextColor(80);
            doc.text(`This document verifies the credentials for ID: ${id}`, 105, 42, { align: 'center' });

            doc.autoTable({
                startY: 55,
                head: [['Field', 'Verified Detail']],
                body: [
                    ['Candidate Name', name],
                    ['Event Attended', '2 Hrs Masterclass'],
                    ['Subject/Course', course],
                    ['Date of Completion', date],
                    ['Status', 'Fully Verified & Authentic']
                ],
                theme: 'grid',
                headStyles: { fillColor: [48, 169, 254], halign: 'center' },
                columnStyles: { 0: { fontStyle: 'bold', cellWidth: 60 } }
            });

            doc.addPage();
            doc.setFontSize(18);
            doc.setTextColor(118, 209, 36); 
            doc.text(`FULL EVENT ROSTER: ${course}`, 14, 20);
            
            doc.setFontSize(10);
            doc.setTextColor(80);
            doc.text("A complete list of all verified candidates for this event.", 14, 28);

            doc.autoTable({
                startY: 35,
                head: [globalHeaders],
                body: globalData,
                theme: 'striped',
                headStyles: { fillColor: [118, 209, 36] } 
            });

            addFooterToPDF(doc);
            doc.save(`${name}_Verification_Record.pdf`);
        }

        function generateGodModePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            doc.setFontSize(22);
            doc.setTextColor(255, 53, 44); 
            doc.text("MASTER DATABASE RECORD", 105, 25, { align: 'center' });
            
            doc.setFontSize(12);
            doc.setTextColor(80);
            doc.text(`Generated by Admin | Dv.Haresh Foundation`, 105, 35, { align: 'center' });

            doc.autoTable({
                startY: 50,
                head: [globalHeaders],
                body: globalData,
                theme: 'grid',
                headStyles: { fillColor: [255, 53, 44] } 
            });

            addFooterToPDF(doc);
            doc.save(`Foundation_Master_Roster.pdf`);
        }

        window.onload = loadData;
    </script>
</body>
</html>
