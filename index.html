<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dv.Haresh Foundation | Certification Verification</title>
    
    <!-- PDF Generation Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-bg: #0d1b2a;
            --card-bg: rgba(255, 255, 255, 0.1);
            --accent: #e0e1dd;
            --success: #2ecc71;
            --text-main: #ffffff;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0d1b2a 0%, #1b263b 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            padding: 30px 0;
            text-align: center;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        h1 { margin: 0; font-size: 1.8rem; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: #e0e1dd; }

        .main-content {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        .verification-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 50px 40px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .verification-card h2 { margin-top: 0; font-size: 1.4rem; margin-bottom: 25px; font-weight: 600; }

        input[type="text"] {
            width: 100%; padding: 15px; margin-bottom: 20px; border: 2px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.2); color: white; border-radius: 10px; font-size: 1rem;
            font-family: inherit; box-sizing: border-box; outline: none; text-align: center; letter-spacing: 1px;
        }

        input[type="text"]:focus { border-color: #415a77; }

        button {
            width: 100%; padding: 15px; border: none; border-radius: 10px; background: #778da9;
            color: white; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: background 0.3s;
        }
        button:hover { background: #415a77; }

        /* Custom styling for the new manual download button */
        .download-btn {
            background: #27ae60;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(39, 174, 96, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .download-btn:hover { background: #219653; }
        .god-btn { background: #8e44ad; box-shadow: 0 4px 15px rgba(142, 68, 173, 0.4); }
        .god-btn:hover { background: #732d91; }

        #result-box { margin-top: 25px; padding: 20px; border-radius: 10px; display: none; font-size: 1.1rem; line-height: 1.6; animation: fadeIn 0.5s ease; }
        .success { background: rgba(46, 204, 113, 0.2); border-left: 5px solid #2ecc71; }
        .error { background: rgba(231, 76, 60, 0.2); border-left: 5px solid #e74c3c; }
        .god-mode { background: rgba(155, 89, 182, 0.2); border-left: 5px solid #9b59b6; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        footer { width: 100%; padding: 20px 0; text-align: center; background: rgba(0, 0, 0, 0.4); margin-top: auto; }
        .logo { max-width: 180px; height: auto; filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.5)); }
    </style>
</head>
<body>

    <header>
        <h1>Dv.Haresh Foundation</h1>
        <div style="font-size: 0.9rem; letter-spacing: 1px; color: #778da9; margin-top: 5px;">CERTIFICATION VERIFICATION</div>
    </header>

    <div class="main-content">
        <div class="verification-card">
            <h2>Enter Certificate ID</h2>
            <input type="text" id="certId" placeholder="e.g. HYPSS-B01" autocomplete="off">
            <button onclick="triggerVerification()">Verify Credential</button>
            
            <div id="result-box"></div>
        </div>
    </div>

    <footer>
        <!-- MUST have id="brand-logo" for the PDF generator to find it -->
        <img src="logo.png" alt="Dv.Haresh Foundation Logo" class="logo" id="brand-logo" crossorigin="anonymous">
    </footer>

    <script>
        const CSV_URL = 'data.csv';
        let globalData = [];
        let globalHeaders = [];

        async function loadData() {
            try {
                const response = await fetch(CSV_URL);
                const text = await response.text();
                const rows = text.split('\n').map(row => row.replace(/\r/g, '').split(','));
                globalHeaders = rows[0].map(h => h.trim());
                globalData = rows.slice(1).filter(row => row.length > 1); 
                
                const urlParams = new URLSearchParams(window.location.search);
                const targetID = urlParams.get('id');
                if (targetID) {
                    document.getElementById('certId').value = targetID;
                    triggerVerification();
                }
            } catch (error) {
                console.error("Database connection error:", error);
            }
        }

        function triggerVerification() {
            const inputId = document.getElementById('certId').value.trim();
            const resultBox = document.getElementById('result-box');
            resultBox.style.display = 'block';
            resultBox.className = ''; 

            if (!inputId) {
                resultBox.innerHTML = "Please enter a valid ID.";
                resultBox.classList.add('error');
                return;
            }

            // GOD MODE
            if (inputId === "GOD") {
                resultBox.innerHTML = `
                    <strong>ADMIN ACCESS GRANTED.</strong><br>
                    Complete database roster is ready for extraction.
                    <button class="download-btn god-btn" onclick="generateGodModePDF()">⬇ Download Master Database</button>
                `;
                resultBox.classList.add('god-mode');
                return;
            }

            // NORMAL VERIFICATION
            const candidateRow = globalData.find(row => row[0] && row[0].trim() === inputId);

            if (candidateRow) {
                const name = candidateRow[1];
                const date = candidateRow[2];
                const course = candidateRow[3];

                resultBox.innerHTML = `
                    <div style="font-size: 2rem; margin-bottom: 10px;">✓</div>
                    <strong>AUTHENTICATED</strong><br><br>
                    Yes, <strong>${name}</strong> is a verified individual who has successfully completed the 2 hrs masterclass in <strong>${course}</strong> on ${date}.
                    <br>
                    <!-- Trigger manual download via button, passing the ID -->
                    <button class="download-btn" onclick="generateNormalPDF('${inputId}')">⬇ Download Official Certificate</button>
                `;
                resultBox.classList.add('success');
            } else {
                resultBox.innerHTML = "<strong>NOT FOUND</strong><br>This certificate ID does not exist in our secure registry.";
                resultBox.classList.add('error');
            }
        }

        // --- NEW: LOGO EXTRACTION ENGINE ---
        function getLogoData() {
            try {
                const img = document.getElementById('brand-logo');
                if (!img || !img.complete || img.naturalWidth === 0) return null;
                
                // Draw logo to an invisible canvas to extract raw image data for PDF
                const canvas = document.createElement('canvas');
                canvas.width = img.naturalWidth;
                canvas.height = img.naturalHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);
                
                return {
                    dataUrl: canvas.toDataURL('image/png'),
                    aspectRatio: img.naturalWidth / img.naturalHeight
                };
            } catch (err) {
                console.warn("Could not load logo for PDF (likely due to local file security restrictions).");
                return null;
            }
        }

        function addFooterToPDF(doc) {
            const pageCount = doc.internal.getNumberOfPages();
            const logo = getLogoData();
            const pageWidth = doc.internal.pageSize.width;
            const pageHeight = doc.internal.pageSize.height;

            for (let i = 1; i <= pageCount; i++) {
                doc.setPage(i);
                
                if (logo) {
                    // Calculate perfectly scaled logo dimensions for the PDF
                    const imgHeight = 12; // Height in mm
                    const imgWidth = imgHeight * logo.aspectRatio; 
                    
                    // Paste Logo
                    doc.addImage(logo.dataUrl, 'PNG', (pageWidth - imgWidth) / 2, pageHeight - 24, imgWidth, imgHeight);
                    // Paste Text directly under it
                    doc.setFontSize(8);
                    doc.setTextColor(150);
                    doc.text("Official Record - Dv.Haresh Foundation", pageWidth / 2, pageHeight - 8, { align: 'center' });
                } else {
                    // Fallback if logo fails to load
                    doc.setFontSize(10);
                    doc.setTextColor(150);
                    doc.text("Official Record - Dv.Haresh Foundation", pageWidth / 2, pageHeight - 10, { align: 'center' });
                }
            }
        }

        function generateNormalPDF(inputId) {
            const candidateRow = globalData.find(row => row[0] === inputId);
            if (!candidateRow) return;

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            const id = candidateRow[0];
            const name = candidateRow[1];
            const date = candidateRow[2];
            const course = candidateRow[3];

            // PAGE 1: BONAFIDE
            doc.setFontSize(22);
            doc.setTextColor(20, 40, 80);
            doc.text("BONAFIDE CERTIFICATE", 105, 30, { align: 'center' });
            
            doc.setFontSize(12);
            doc.setTextColor(50);
            doc.text(`This document verifies the credentials for ID: ${id}`, 105, 45, { align: 'center' });

            doc.autoTable({
                startY: 60,
                head: [['Field', 'Verified Detail']],
                body: [
                    ['Candidate Name', name],
                    ['Event Attended', '2 Hrs Masterclass'],
                    ['Subject/Course', course],
                    ['Date of Completion', date],
                    ['Status', 'Fully Verified & Authentic']
                ],
                theme: 'grid',
                headStyles: { fillColor: [27, 38, 59], halign: 'center' },
                columnStyles: { 0: { fontStyle: 'bold', cellWidth: 60 } }
            });

            // PAGE 2: ROSTER
            doc.addPage();
            doc.setFontSize(18);
            doc.setTextColor(20, 40, 80);
            doc.text(`FULL EVENT ROSTER: ${course}`, 14, 20);
            
            doc.setFontSize(10);
            doc.text("A complete list of all verified candidates for this event.", 14, 28);

            doc.autoTable({
                startY: 35,
                head: [globalHeaders],
                body: globalData,
                theme: 'striped',
                headStyles: { fillColor: [119, 141, 169] }
            });

            addFooterToPDF(doc);
            doc.save(`${name}_Verification_Record.pdf`);
        }

        function generateGodModePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            doc.setFontSize(22);
            doc.setTextColor(155, 89, 182); 
            doc.text("MASTER DATABASE RECORD", 105, 25, { align: 'center' });
            
            doc.setFontSize(12);
            doc.setTextColor(50);
            doc.text(`Generated by Admin | Dv.Haresh Foundation`, 105, 35, { align: 'center' });

            doc.autoTable({
                startY: 50,
                head: [globalHeaders],
                body: globalData,
                theme: 'grid',
                headStyles: { fillColor: [155, 89, 182] }
            });

            addFooterToPDF(doc);
            doc.save(`Foundation_Master_Roster.pdf`);
        }

        window.onload = loadData;
    </script>
</body>
</html>
